<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Open Source Bible">
  <defs>
    <clipPath id="round"><rect width="32" height="32" rx="7"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- green-white-green vertical bands (wider white center) -->
    <rect x="0" y="0" width="9" height="32" fill="#2F6457"/>
    <rect x="9" y="0" width="14" height="32" fill="#FFFFFF"/>
    <rect x="23" y="0" width="9" height="32" fill="#2F6457"/>
    <!-- centered green cross, with clear white margin on all sides -->
    <rect x="14.3" y="6.5" width="3.4" height="19" rx="0.8" fill="#2F6457"/>
    <rect x="11" y="14.3" width="10" height="3.4" rx="0.8" fill="#2F6457"/>
  </g>
</svg>
