<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Open Source Bible">
  <defs>
    <clipPath id="round"><rect width="32" height="32" rx="7"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- light-blue tile, matching the website background -->
    <rect width="32" height="32" fill="#DCEAF5"/>
    <!-- white Latin cross: crossbar lifted into the upper third, longer lower stem -->
    <rect x="14.4" y="4.5" width="3.2" height="22.5" rx="0.8" fill="#FFFFFF"/>
    <rect x="10.3" y="9.5" width="11.4" height="3.2" rx="0.8" fill="#FFFFFF"/>
  </g>
</svg>
